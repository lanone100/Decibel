<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>聲音分貝測量儀</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap');

:root {
  /* Apple-inspired palette */
  --ios-bg: #f2f2f7;
  --ios-bg2: #ffffff;
  --ios-grouped: #f2f2f7;
  --ios-label: #1c1c1e;
  --ios-label2: #3a3a3c;
  --ios-label3: #636366;
  --ios-label4: #aeaeb2;
  --ios-sep: rgba(60,60,67,0.12);

  /* Apple accent colors */
  --blue: #007aff;
  --green: #34c759;
  --yellow: #ffd60a;
  --orange: #ff9f0a;
  --red: #ff3b30;
  --pink: #ff2d55;
  --purple: #af52de;
  --teal: #5ac8fa;
  --mint: #00c7be;

  /* Glass */
  --glass-bg: rgba(255,255,255,0.72);
  --glass-border: rgba(255,255,255,0.85);
  --glass-shadow: 0 8px 32px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);

  --radius-card: 22px;
  --radius-inner: 14px;

  font-size: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
  background: var(--ios-bg);
  color: var(--ios-label);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* Ambient background blobs */
.ambient {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.18;
  animation: blobDrift 12s ease-in-out infinite alternate;
}

.blob-1 { width: 400px; height: 400px; background: var(--blue); top: -100px; right: -80px; animation-delay: 0s; }
.blob-2 { width: 300px; height: 300px; background: var(--mint); bottom: 100px; left: -80px; animation-delay: -4s; }
.blob-3 { width: 250px; height: 250px; background: var(--purple); top: 40%; right: -60px; animation-delay: -8s; }

@keyframes blobDrift {
  0% { transform: translate(0, 0) scale(1); }
  100% { transform: translate(30px, 20px) scale(1.1); }
}

/* Layout */
.scroll-wrap {
  position: relative;
  z-index: 1;
  max-width: 430px;
  margin: 0 auto;
  padding: 0 16px 48px;
}

/* Status bar spacer */
.status-spacer { height: env(safe-area-inset-top, 44px); }

/* Navigation bar */
.nav-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 4px 8px;
}

.nav-title {
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.3px;
  color: var(--ios-label);
}

.nav-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  box-shadow: var(--glass-shadow);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 15px;
  color: var(--blue);
  font-weight: 600;
  transition: transform 0.12s ease, opacity 0.12s ease;
  user-select: none;
}
.nav-btn:active { transform: scale(0.92); opacity: 0.7; }

/* Hero card - big dB */
.hero-card {
  background: var(--glass-bg);
  backdrop-filter: blur(40px) saturate(1.8);
  -webkit-backdrop-filter: blur(40px) saturate(1.8);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-card);
  box-shadow: var(--glass-shadow);
  padding: 28px 24px 24px;
  margin-bottom: 14px;
  position: relative;
  overflow: hidden;
  transition: box-shadow 0.4s ease;
}

.hero-card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: var(--radius-card);
  background: linear-gradient(145deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 60%);
  pointer-events: none;
}

/* Liquid color blob inside card */
.card-blob {
  position: absolute;
  width: 200px; height: 200px;
  border-radius: 50%;
  filter: blur(60px);
  opacity: 0.12;
  top: -40px; right: -40px;
  transition: background 0.6s ease, opacity 0.6s ease;
  pointer-events: none;
}

.hero-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 16px;
}

.hero-meta { display: flex; flex-direction: column; gap: 3px; }
.hero-eyebrow {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.8px;
  color: var(--ios-label4);
  text-transform: uppercase;
}

.live-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.3px;
  background: rgba(52,199,89,0.12);
  color: var(--green);
  transition: all 0.3s ease;
}

.live-pill.standby {
  background: rgba(174,174,178,0.15);
  color: var(--ios-label4);
}

.live-dot-pill {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: currentColor;
  animation: pillBlink 1.4s ease infinite;
}
.live-pill.standby .live-dot-pill { animation: none; }

@keyframes pillBlink {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.8); }
}

/* Huge dB number */
.db-number-wrap {
  text-align: center;
  padding: 8px 0 12px;
}

.db-number {
  font-size: clamp(86px, 26vw, 120px);
  font-weight: 300;
  letter-spacing: -6px;
  line-height: 1;
  color: var(--ios-label);
  transition: color 0.3s ease;
  font-variant-numeric: tabular-nums;
}

.db-number .decimal {
  font-size: 0.45em;
  font-weight: 400;
  letter-spacing: -2px;
  opacity: 0.7;
}

.db-number .unit-inline {
  font-size: 0.22em;
  font-weight: 500;
  letter-spacing: 2px;
  opacity: 0.45;
  vertical-align: super;
  margin-left: 4px;
  letter-spacing: 1px;
}

/* Level badge */
.level-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 16px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: -0.2px;
  background: rgba(174,174,178,0.15);
  color: var(--ios-label3);
  transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
}

/* === Segmented gauge === */
.seg-gauge-wrap {
  margin-top: 16px;
}

.seg-gauge {
  display: flex;
  gap: 3px;
  height: 6px;
  border-radius: 10px;
  overflow: hidden;
}

.seg-unit {
  flex: 1;
  border-radius: 3px;
  background: rgba(0,0,0,0.07);
  transition: background 0.08s ease, transform 0.08s ease;
}

.seg-scale {
  display: flex;
  justify-content: space-between;
  margin-top: 5px;
  padding: 0 1px;
}
.seg-scale span {
  font-size: 9px;
  color: var(--ios-label4);
  font-weight: 500;
  letter-spacing: 0.3px;
}

/* Cards grid */
.cards-grid {
  display: flex;
  flex-direction: column;
  gap: 7px;
  margin-bottom: 14px;
}

/* Stat card */
.stat-card {
  background: var(--glass-bg);
  backdrop-filter: blur(30px) saturate(1.6);
  -webkit-backdrop-filter: blur(30px) saturate(1.6);
  border: 1px solid var(--glass-border);
  border-radius: 14px;
  box-shadow: var(--glass-shadow);
  padding: 11px 14px;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: transform 0.2s ease;
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  border-radius: 14px;
  background: linear-gradient(145deg, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0) 55%);
  pointer-events: none;
}

.stat-icon { display: none; }

.stat-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--ios-label4);
  letter-spacing: 0.1px;
  white-space: nowrap;
}

.stat-value {
  font-size: 20px;
  font-weight: 500;
  letter-spacing: -0.5px;
  color: var(--ios-label);
  font-variant-numeric: tabular-nums;
  line-height: 1;
  margin-left: auto;
}

.stat-unit {
  font-size: 11px;
  font-weight: 500;
  color: var(--ios-label4);
  letter-spacing: 0.3px;
  margin-left: 2px;
}

/* Gauge arc card */
.arc-card {
  background: var(--glass-bg);
  backdrop-filter: blur(30px) saturate(1.6);
  -webkit-backdrop-filter: blur(30px) saturate(1.6);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-card);
  box-shadow: var(--glass-shadow);
  padding: 20px 18px 16px;
  margin-bottom: 14px;
  position: relative;
  overflow: hidden;
}

.arc-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(145deg, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0) 55%);
  pointer-events: none;
  border-radius: var(--radius-card);
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}

.card-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--ios-label2);
  letter-spacing: -0.2px;
}

.card-tag {
  font-size: 11px;
  font-weight: 500;
  color: var(--ios-label4);
  letter-spacing: 0.3px;
}

.arc-wrap {
  display: flex;
  justify-content: center;
  align-items: center;
}

#gaugeCanvas {
  width: 100%;
  max-width: 300px;
  display: block;
}

/* Waveform card */
.wave-card {
  background: var(--glass-bg);
  backdrop-filter: blur(30px) saturate(1.6);
  -webkit-backdrop-filter: blur(30px) saturate(1.6);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-card);
  box-shadow: var(--glass-shadow);
  padding: 20px 18px 16px;
  margin-bottom: 14px;
  overflow: hidden;
  position: relative;
}

.wave-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(145deg, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0) 55%);
  pointer-events: none;
  border-radius: var(--radius-card);
}

#waveCanvas {
  width: 100%;
  height: 68px;
  display: block;
  border-radius: 10px;
}

/* Reference list card */
.ref-card {
  background: var(--glass-bg);
  backdrop-filter: blur(30px) saturate(1.6);
  -webkit-backdrop-filter: blur(30px) saturate(1.6);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-card);
  box-shadow: var(--glass-shadow);
  overflow: hidden;
  margin-bottom: 14px;
}

.ref-card-header {
  padding: 18px 18px 12px;
}

.ref-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 18px;
  border-top: 1px solid var(--ios-sep);
  transition: background 0.2s ease;
  position: relative;
}

.ref-row.active-ref {
  background: rgba(0,122,255,0.05);
}

.ref-color-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.ref-info { flex: 1; }
.ref-name-txt {
  font-size: 14px;
  font-weight: 500;
  color: var(--ios-label);
  letter-spacing: -0.2px;
}
.ref-desc {
  font-size: 12px;
  color: var(--ios-label4);
  margin-top: 1px;
}

.ref-db-badge {
  font-size: 15px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  color: var(--ios-label2);
  letter-spacing: -0.5px;
}

/* Control button */
.cta-wrap {
  padding: 4px 0 12px;
}

.btn-cta {
  width: 100%;
  padding: 17px;
  border: none;
  border-radius: 16px;
  font-family: inherit;
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.3px;
  cursor: pointer;
  background: var(--blue);
  color: white;
  transition: all 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 4px 20px rgba(0,122,255,0.35);
  position: relative;
  overflow: hidden;
}

.btn-cta::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(145deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 60%);
  border-radius: 16px;
}

.btn-cta:active { transform: scale(0.97); }

.btn-cta.recording {
  background: var(--red);
  box-shadow: 0 4px 20px rgba(255,59,48,0.35);
}

.btn-row {
  display: flex;
  gap: 12px;
}

.btn-secondary {
  flex: none;
  width: 56px;
  padding: 17px;
  border: none;
  border-radius: 16px;
  font-family: inherit;
  font-size: 20px;
  cursor: pointer;
  background: rgba(120,120,128,0.12);
  color: var(--ios-label3);
  transition: all 0.15s ease;
  backdrop-filter: blur(10px);
}

.btn-secondary:active { transform: scale(0.93); opacity: 0.7; }

/* Permission msg */
.perm-banner {
  display: none;
  background: rgba(255,159,10,0.12);
  border: 1px solid rgba(255,159,10,0.3);
  border-radius: var(--radius-inner);
  padding: 12px 16px;
  margin-bottom: 14px;
  font-size: 13px;
  color: var(--orange);
  line-height: 1.6;
  text-align: center;
}

/* Footer */
.footer {
  text-align: center;
  font-size: 11px;
  color: var(--ios-label4);
  letter-spacing: 0.3px;
  padding: 8px 0 16px;
}

/* ===  PC responsive === */
@media (min-width: 768px) {
  .scroll-wrap {
    max-width: 820px;
    padding: 0 24px 60px;
  }

  .pc-grid-main {
    display: grid;
    grid-template-columns: 1.1fr 0.9fr;
    gap: 14px;
    align-items: start;
  }

  .pc-col { display: flex; flex-direction: column; gap: 14px; }
  .pc-wide { grid-column: 1 / -1; }

  .db-number { font-size: 110px; }
}

/* Color theme transitions */
.theme-green .db-number { color: var(--green); }
.theme-blue .db-number { color: var(--blue); }
.theme-yellow .db-number { color: #c9960a; }
.theme-orange .db-number { color: var(--orange); }
.theme-red .db-number { color: var(--red); }

</style>
</head>
<body>

<div class="ambient">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<div class="scroll-wrap">
  <div class="status-spacer"></div>

  <!-- Nav -->
  <div class="nav-bar" style="justify-content:center;">
    <div class="nav-title" style="font-size:19px; font-weight:700; letter-spacing:-0.5px;">聲音分貝測量儀</div>
  </div>

  <!-- Permission banner -->
  <div class="perm-banner" id="permMsg">⚠️ 請允許麥克風存取權限，才能開始測量。</div>

  <!-- PC grid wrapper -->
  <div class="pc-grid-main">
    <div class="pc-col">

      <!-- Hero card -->
      <div class="hero-card" id="heroCard">
        <div class="card-blob" id="cardBlob" style="background: var(--blue);"></div>
        <div class="hero-top">
          <div class="hero-meta">
            <div class="hero-eyebrow">Sound Level</div>
            <div style="font-size:13px; font-weight:500; color:var(--ios-label2); margin-top:2px;" id="levelDesc">等待測量</div>
          </div>
          <div class="live-pill standby" id="livePill">
            <div class="live-dot-pill"></div>
            <span id="liveText">待機</span>
          </div>
        </div>

        <div class="db-number-wrap">
          <div class="db-number" id="dbNumber">
            <span id="dbInt">--</span><span class="decimal" id="dbDec"></span><span class="unit-inline">dB</span>
          </div>
        </div>

        <div style="text-align:center; margin-bottom: 18px;">
          <span class="level-chip" id="levelChip">● 等待測量</span>
        </div>

        <!-- Segmented bar -->
        <div class="seg-gauge-wrap">
          <div class="seg-gauge" id="segGauge"></div>
          <div class="seg-scale">
            <span>0</span><span>30</span><span>60</span><span>90</span><span>120 dB</span>
          </div>
        </div>
      </div>

      <!-- CTA -->
      <div class="cta-wrap">
        <div class="btn-row">
          <button class="btn-cta" id="btnStart" onclick="toggleMic()">🎙 開始測量</button>
          <button class="btn-secondary" onclick="resetStats()">↺</button>
        </div>
      </div>

      <!-- Stats grid -->
      <div class="cards-grid">
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(52,199,89,0.12);">📉</div>
          <div class="stat-label">最小值</div>
          <div class="stat-value" id="minVal" style="color:var(--green)">--</div>
          <div class="stat-unit">dB</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(255,159,10,0.12);">📈</div>
          <div class="stat-label">最大值</div>
          <div class="stat-value" id="maxVal" style="color:var(--orange)">--</div>
          <div class="stat-unit">dB</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(0,122,255,0.12);">📊</div>
          <div class="stat-label">平均值</div>
          <div class="stat-value" id="avgVal" style="color:var(--blue)">--</div>
          <div class="stat-unit">dB</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(175,82,222,0.12);">🔢</div>
          <div class="stat-label">取樣數</div>
          <div class="stat-value" id="sampleCount" style="color:var(--purple)">0</div>
          <div class="stat-unit">筆</div>
        </div>
      </div>


    </div><!-- /pc-col left -->

    <div class="pc-col">

      <!-- Arc gauge -->
      <div class="arc-card">
        <div class="card-header">
          <div class="card-title">量表</div>
          <div class="card-tag" id="gaugePct">0%</div>
        </div>
        <div class="arc-wrap">
          <canvas id="gaugeCanvas" width="300" height="175"></canvas>
        </div>
      </div>

      <!-- Waveform -->
      <div class="wave-card">
        <div class="card-header">
          <div class="card-title">波形歷史</div>
          <div class="card-tag">100 取樣</div>
        </div>
        <canvas id="waveCanvas" width="400" height="68"></canvas>
      </div>

      <!-- Sound reference -->
      <div class="ref-card">
        <div class="ref-card-header">
          <div class="card-title">聲音等級參考</div>
        </div>

        <div class="ref-row" data-db="20" data-to="40">
          <div class="ref-color-dot" style="background:var(--mint)"></div>
          <div class="ref-info">
            <div class="ref-name-txt">極度安靜</div>
            <div class="ref-desc">樹葉沙沙、耳語聲</div>
          </div>
          <div class="ref-db-badge">20–40</div>
        </div>

        <div class="ref-row" data-db="40" data-to="60">
          <div class="ref-color-dot" style="background:var(--green)"></div>
          <div class="ref-info">
            <div class="ref-name-txt">安靜環境</div>
            <div class="ref-desc">圖書館、臥室</div>
          </div>
          <div class="ref-db-badge">40–60</div>
        </div>

        <div class="ref-row" data-db="60" data-to="75">
          <div class="ref-color-dot" style="background:var(--blue)"></div>
          <div class="ref-info">
            <div class="ref-name-txt">正常談話</div>
            <div class="ref-desc">辦公室、餐廳</div>
          </div>
          <div class="ref-db-badge">60–75</div>
        </div>

        <div class="ref-row" data-db="75" data-to="90">
          <div class="ref-color-dot" style="background:var(--yellow)"></div>
          <div class="ref-info">
            <div class="ref-name-txt">吵鬧環境</div>
            <div class="ref-desc">鬧市、工廠</div>
          </div>
          <div class="ref-db-badge">75–90</div>
        </div>

        <div class="ref-row" data-db="90" data-to="110">
          <div class="ref-color-dot" style="background:var(--orange)"></div>
          <div class="ref-info">
            <div class="ref-name-txt">危險噪音</div>
            <div class="ref-desc">演唱會、電鑽</div>
          </div>
          <div class="ref-db-badge">90–110</div>
        </div>

        <div class="ref-row" data-db="110" data-to="130">
          <div class="ref-color-dot" style="background:var(--red)"></div>
          <div class="ref-info">
            <div class="ref-name-txt">⚠ 聽力受損</div>
            <div class="ref-desc">長時間暴露有害</div>
          </div>
          <div class="ref-db-badge">110+</div>
        </div>
      </div>

    </div><!-- /pc-col right -->
  </div><!-- /pc-grid -->

  <div class="footer">分貝儀 · dBmeter &nbsp;·&nbsp; 請在安靜環境校準裝置</div>
</div>

<script>
// ── Build segmented bar ──
const segEl = document.getElementById('segGauge');
const SEG_COUNT = 36;
for (let i = 0; i < SEG_COUNT; i++) {
  const d = document.createElement('div');
  d.className = 'seg-unit';
  segEl.appendChild(d);
}

// ── Gauge canvas ──
const gCvs = document.getElementById('gaugeCanvas');
const gCtx = gCvs.getContext('2d');

function drawGauge(db) {
  const W = gCvs.width, H = gCvs.height;
  gCtx.clearRect(0, 0, W, H);
  const cx = W / 2, cy = H - 14;
  const rOut = Math.min(W * 0.44, H * 0.84);
  const rIn = rOut - 22;

  // Track background
  gCtx.beginPath();
  gCtx.arc(cx, cy, rOut - 11, Math.PI, 0);
  gCtx.lineWidth = 22;
  gCtx.strokeStyle = 'rgba(0,0,0,0.06)';
  gCtx.lineCap = 'round';
  gCtx.stroke();

  // Color segments on track
  const segs = [
    { from: 0, to: 0.42, c1: '#00c7be', c2: '#34c759' },
    { from: 0.42, to: 0.60, c1: '#34c759', c2: '#007aff' },
    { from: 0.60, to: 0.72, c1: '#007aff', c2: '#ffd60a' },
    { from: 0.72, to: 0.85, c1: '#ffd60a', c2: '#ff9f0a' },
    { from: 0.85, to: 1.00, c1: '#ff9f0a', c2: '#ff3b30' },
  ];

  segs.forEach(seg => {
    const sa = Math.PI + seg.from * Math.PI;
    const ea = Math.PI + seg.to * Math.PI;
    const grad = gCtx.createLinearGradient(
      cx + rOut * Math.cos(sa), cy + rOut * Math.sin(sa),
      cx + rOut * Math.cos(ea), cy + rOut * Math.sin(ea)
    );
    grad.addColorStop(0, seg.c1 + '28');
    grad.addColorStop(1, seg.c2 + '28');
    gCtx.beginPath();
    gCtx.arc(cx, cy, rOut - 11, sa, ea);
    gCtx.lineWidth = 22;
    gCtx.strokeStyle = grad;
    gCtx.lineCap = 'butt';
    gCtx.stroke();
  });

  // Active fill
  const pct = Math.max(0, Math.min(1, db / 120));
  if (pct > 0.005) {
    const activeGrad = gCtx.createLinearGradient(cx - rOut, cy, cx + rOut, cy);
    activeGrad.addColorStop(0, '#00c7be');
    activeGrad.addColorStop(0.42, '#34c759');
    activeGrad.addColorStop(0.62, '#007aff');
    activeGrad.addColorStop(0.75, '#ffd60a');
    activeGrad.addColorStop(0.88, '#ff9f0a');
    activeGrad.addColorStop(1, '#ff3b30');

    gCtx.beginPath();
    gCtx.arc(cx, cy, rOut - 11, Math.PI, Math.PI + pct * Math.PI);
    gCtx.lineWidth = 22;
    gCtx.strokeStyle = activeGrad;
    gCtx.lineCap = 'round';
    gCtx.shadowColor = pct > 0.85 ? '#ff3b30' : pct > 0.6 ? '#007aff' : '#34c759';
    gCtx.shadowBlur = 10;
    gCtx.stroke();
    gCtx.shadowBlur = 0;
  }

  // Needle
  const ang = Math.PI + pct * Math.PI;
  const nLen = rOut - 28;
  gCtx.beginPath();
  gCtx.moveTo(cx, cy);
  gCtx.lineTo(cx + nLen * Math.cos(ang), cy + nLen * Math.sin(ang));
  gCtx.lineWidth = 2;
  gCtx.strokeStyle = 'rgba(0,0,0,0.5)';
  gCtx.lineCap = 'round';
  gCtx.stroke();

  // Center knob
  gCtx.beginPath();
  gCtx.arc(cx, cy, 8, 0, Math.PI * 2);
  gCtx.fillStyle = 'rgba(0,0,0,0.15)';
  gCtx.fill();
  gCtx.beginPath();
  gCtx.arc(cx, cy, 6, 0, Math.PI * 2);
  gCtx.fillStyle = 'white';
  gCtx.shadowColor = 'rgba(0,0,0,0.2)';
  gCtx.shadowBlur = 4;
  gCtx.fill();
  gCtx.shadowBlur = 0;

  // Tick labels
  [0, 30, 60, 90, 120].forEach(val => {
    const a = Math.PI + (val / 120) * Math.PI;
    const tr = rOut + 14;
    const tx = cx + tr * Math.cos(a), ty = cy + tr * Math.sin(a);
    gCtx.font = '500 10px DM Sans, -apple-system, sans-serif';
    gCtx.fillStyle = 'rgba(0,0,0,0.35)';
    gCtx.textAlign = 'center';
    gCtx.textBaseline = 'middle';
    gCtx.fillText(val, tx, ty);
  });

  document.getElementById('gaugePct').textContent = Math.round(pct * 100) + '%';
}

// ── Waveform ──
const wCvs = document.getElementById('waveCanvas');
const wCtx = wCvs.getContext('2d');
let waveHist = new Float32Array(100).fill(0);

function drawWave(db) {
  waveHist = new Float32Array([...waveHist.slice(1), db]);
  const dpr = window.devicePixelRatio || 1;
  const W = wCvs.offsetWidth * dpr || 400;
  const H = 68;
  wCvs.width = W; wCvs.height = H;

  wCtx.clearRect(0, 0, W, H);

  const len = waveHist.length;
  const sx = W / (len - 1);

  // Fill area
  const fillGrad = wCtx.createLinearGradient(0, 0, 0, H);
  fillGrad.addColorStop(0, 'rgba(0,122,255,0.12)');
  fillGrad.addColorStop(1, 'rgba(0,122,255,0)');

  wCtx.beginPath();
  for (let i = 0; i < len; i++) {
    const x = i * sx;
    const y = H - (waveHist[i] / 120) * (H - 8) - 4;
    i === 0 ? wCtx.moveTo(x, y) : wCtx.lineTo(x, y);
  }
  wCtx.lineTo(W, H); wCtx.lineTo(0, H); wCtx.closePath();
  wCtx.fillStyle = fillGrad;
  wCtx.fill();

  // Line
  const lineGrad = wCtx.createLinearGradient(0, 0, W, 0);
  lineGrad.addColorStop(0, 'rgba(0,199,190,0.6)');
  lineGrad.addColorStop(0.5, 'rgba(0,122,255,0.9)');
  lineGrad.addColorStop(1, 'rgba(0,122,255,1)');

  wCtx.beginPath();
  for (let i = 0; i < len; i++) {
    const x = i * sx;
    const y = H - (waveHist[i] / 120) * (H - 8) - 4;
    i === 0 ? wCtx.moveTo(x, y) : wCtx.lineTo(x, y);
  }
  wCtx.strokeStyle = lineGrad;
  wCtx.lineWidth = 1.5;
  wCtx.lineJoin = 'round';
  wCtx.stroke();
}

// ── Level info ──
function getLevelInfo(db) {
  if (db < 30) return { label: '🍃 極度安靜', desc: '幾乎無聲', color: 'var(--mint)', bg: 'rgba(0,199,190,0.1)', blob: '#00c7be', theme: 'theme-green' };
  if (db < 50) return { label: '🔇 安靜', desc: '安靜空間', color: 'var(--green)', bg: 'rgba(52,199,89,0.1)', blob: '#34c759', theme: 'theme-green' };
  if (db < 65) return { label: '💬 正常', desc: '日常對話', color: 'var(--blue)', bg: 'rgba(0,122,255,0.1)', blob: '#007aff', theme: 'theme-blue' };
  if (db < 75) return { label: '🔊 偏響', desc: '較為嘈雜', color: '#c9960a', bg: 'rgba(255,214,10,0.1)', blob: '#ffd60a', theme: 'theme-yellow' };
  if (db < 90) return { label: '⚡ 吵鬧', desc: '建議保護耳朵', color: 'var(--orange)', bg: 'rgba(255,159,10,0.1)', blob: '#ff9f0a', theme: 'theme-orange' };
  return { label: '⚠ 危險！', desc: '立即遠離！', color: 'var(--red)', bg: 'rgba(255,59,48,0.1)', blob: '#ff3b30', theme: 'theme-red' };
}

// ── Update UI ──
let dbHistory = [];
const themes = ['theme-green', 'theme-blue', 'theme-yellow', 'theme-orange', 'theme-red'];

function updateUI(db) {
  // Number display
  const intPart = Math.floor(db);
  const decPart = (db % 1).toFixed(1).slice(1);
  document.getElementById('dbInt').textContent = intPart;
  document.getElementById('dbDec').textContent = decPart;

  const info = getLevelInfo(db);

  // Hero theme
  const hero = document.getElementById('heroCard');
  themes.forEach(t => hero.classList.remove(t));
  hero.classList.add(info.theme);

  // Blob
  document.getElementById('cardBlob').style.background = info.blob;

  // Chips
  const chip = document.getElementById('levelChip');
  chip.textContent = info.label;
  chip.style.background = info.bg;
  chip.style.color = info.color;

  document.getElementById('levelDesc').textContent = info.desc;

  // Segmented bar
  const segs = segEl.children;
  const active = Math.round((db / 120) * SEG_COUNT);
  for (let i = 0; i < SEG_COUNT; i++) {
    if (i < active) {
      const ratio = i / SEG_COUNT;
      let c;
      if (ratio < 0.42) c = lerpColor('#00c7be', '#34c759', ratio / 0.42);
      else if (ratio < 0.62) c = lerpColor('#34c759', '#007aff', (ratio - 0.42) / 0.2);
      else if (ratio < 0.75) c = lerpColor('#007aff', '#ffd60a', (ratio - 0.62) / 0.13);
      else if (ratio < 0.88) c = lerpColor('#ffd60a', '#ff9f0a', (ratio - 0.75) / 0.13);
      else c = lerpColor('#ff9f0a', '#ff3b30', (ratio - 0.88) / 0.12);
      segs[i].style.background = c;
      segs[i].style.boxShadow = i === active - 1 ? `0 0 6px ${c}` : 'none';
    } else {
      segs[i].style.background = 'rgba(0,0,0,0.07)';
      segs[i].style.boxShadow = 'none';
    }
  }

  // Stats
  dbHistory.push(db);
  if (dbHistory.length > 600) dbHistory.shift();
  const mn = Math.min(...dbHistory), mx = Math.max(...dbHistory);
  const av = dbHistory.reduce((a, b) => a + b, 0) / dbHistory.length;
  document.getElementById('minVal').textContent = mn.toFixed(1);
  document.getElementById('maxVal').textContent = mx.toFixed(1);
  document.getElementById('avgVal').textContent = av.toFixed(1);
  document.getElementById('sampleCount').textContent = dbHistory.length;

  // Reference highlight
  document.querySelectorAll('.ref-row').forEach(row => {
    const from = parseInt(row.dataset.db);
    const to = parseInt(row.dataset.to);
    row.classList.toggle('active-ref', db >= from && db < to);
  });

  drawGauge(db);
  drawWave(db);
}

function lerpColor(a, b, t) {
  const ah = parseInt(a.slice(1), 16), bh = parseInt(b.slice(1), 16);
  const ar = ah >> 16, ag = (ah >> 8) & 0xff, ab = ah & 0xff;
  const br = bh >> 16, bg = (bh >> 8) & 0xff, bb = bh & 0xff;
  const rr = Math.round(ar + (br - ar) * t);
  const rg = Math.round(ag + (bg - ag) * t);
  const rb = Math.round(ab + (bb - ab) * t);
  return `rgb(${rr},${rg},${rb})`;
}

// ── Audio ──
let audioCtx = null, analyser = null, stream = null, animId = null, isRunning = false;
let frameN = 0;

async function toggleMic() {
  isRunning ? stopMic() : await startMic();
}

async function startMic() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.35;
    audioCtx.createMediaStreamSource(stream).connect(analyser);

    isRunning = true;
    const btn = document.getElementById('btnStart');
    btn.textContent = '⏹ 停止測量';
    btn.classList.add('recording');

    const pill = document.getElementById('livePill');
    pill.classList.remove('standby');
    document.getElementById('liveText').textContent = '測量中';
    document.getElementById('permMsg').style.display = 'none';

    loop();
  } catch (e) {
    document.getElementById('permMsg').style.display = 'block';
  }
}

function stopMic() {
  isRunning = false;
  if (animId) cancelAnimationFrame(animId);
  stream?.getTracks().forEach(t => t.stop());
  audioCtx?.close();

  const btn = document.getElementById('btnStart');
  btn.textContent = '🎙 開始測量';
  btn.classList.remove('recording');

  const pill = document.getElementById('livePill');
  pill.classList.add('standby');
  document.getElementById('liveText').textContent = '待機';
}

function loop() {
  if (!isRunning) return;
  animId = requestAnimationFrame(loop);
  if (++frameN % 3 !== 0) return;

  const buf = new Float32Array(analyser.frequencyBinCount);
  analyser.getFloatTimeDomainData(buf);
  let sum = 0;
  for (let v of buf) sum += v * v;
  const rms = Math.sqrt(sum / buf.length);
  const db = rms > 0 ? Math.max(0, Math.min(130, 20 * Math.log10(rms) + 90)) : 0;
  updateUI(db);
}

function resetStats() {
  dbHistory = []; waveHist = new Float32Array(100).fill(0);
  ['minVal','maxVal','avgVal'].forEach(id => document.getElementById(id).textContent = '--');
  document.getElementById('sampleCount').textContent = '0';
  document.getElementById('dbInt').textContent = '--';
  document.getElementById('dbDec').textContent = '';
  document.getElementById('levelDesc').textContent = '等待測量';
  document.getElementById('levelChip').textContent = '● 等待測量';
  document.getElementById('levelChip').style.cssText = '';
  Array.from(segEl.children).forEach(s => { s.style.background = 'rgba(0,0,0,0.07)'; s.style.boxShadow = 'none'; });
  drawGauge(0); drawWave(0);
}

// Init
drawGauge(0); drawWave(0);
window.addEventListener('resize', () => { if (!isRunning) { drawGauge(0); drawWave(0); } });
</script>
</body>
